<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>History - Alex's Workout Tracker</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ff9d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        :root { --accent: #00ff9d; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin:0; padding:0; background:#0f0f0f; color:#fff; max-width:600px; margin:0 auto; min-height:100vh; }
        header { background:#181818; padding:20px 16px; border-bottom:3px solid var(--accent); display:flex; align-items:center; justify-content:space-between; }
        h1 { margin:0; font-size:24px; font-weight:700; }
        .hamburger { font-size:28px; background:none; border:none; color:#fff; cursor:pointer; padding:8px; }
        .menu { display:none; position:absolute; top:68px; right:16px; background:#181818; border-radius:16px; padding:12px 0; box-shadow:0 10px 20px rgba(0,0,0,0.5); width:280px; z-index:1000; }
        .menu.show { display:block; }
        .menu a { display:block; padding:16px 24px; color:#fff; text-decoration:none; font-size:18px; font-weight:600; }
        .menu a:hover { background:#222; }
        .content { padding:16px; }
        .history-item { background:#1c1c1c; padding:18px; margin-bottom:16px; border-radius:16px; position:relative; cursor:pointer; }
        .delete-btn { position:absolute; top:12px; right:12px; background:#ff4444; color:white; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; }
    </style>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</head>
<body>

    <header>
        <h1>Workout History</h1>
        <button onclick="toggleMenu()" class="hamburger">☰</button>
    </header>

    <div id="menu" class="menu">
        <a href="index.html">Track Today's Workout</a>
        <a href="history.html">View Workout History</a>
        <a href="progress.html">See Your Progress</a>
        <a href="plan.html">Create / Edit Split</a>
    </div>

    <div class="content">
        <h2 style="margin:10px 0 15px 0;">Your Past Workouts</h2>
        <div id="history-list"></div>
    </div>

    <script>
        function loadFromStorage(key) { const data = localStorage.getItem(key); return data ? JSON.parse(data) : []; }
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('show');
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            const history = loadFromStorage('workoutHistory');
            if (history.length === 0) {
                container.innerHTML = `<p style="color:#666;text-align:center;padding:60px 20px;">No workouts saved yet.<br><br>Go track your first workout!</p>`;
                return;
            }
            let html = '';
            history.forEach((entry, index) => {
                let totalSets = 0, completedSets = 0;
                entry.log.forEach(ex => { totalSets += ex.sets.length; completedSets += ex.sets.filter(s => s.completed).length; });
                const date = new Date(entry.date).toLocaleDateString('en-GB');
                html += `
                <div class="history-item" onclick="loadPastWorkout(${index});">
                    <strong>${entry.dayName}</strong> – ${date}<br>
                    <small style="color:#00ff9d;">${completedSets} of ${totalSets} sets completed</small>
                    <div class="delete-btn" onclick="event.stopImmediatePropagation();deleteWorkout(${index});">×</div>
                </div>`;
            });
            container.innerHTML = html;
        }

        window.loadPastWorkout = function(index) {
            window.location.href = `index.html?pastIndex=${index}`;
        };

        window.deleteWorkout = function(index) {
            if (!confirm('Delete this workout permanently?')) return;
            let history = loadFromStorage('workoutHistory');
            history.splice(index, 1);
            localStorage.setItem('workoutHistory', JSON.stringify(history));
            renderHistory();
        };

        window.onload = renderHistory;
    </script>
</body>
</html>
