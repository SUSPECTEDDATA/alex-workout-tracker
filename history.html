<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>History - Alex's Workout Tracker</title>
    <style>
        :root { --accent: #00ff9d; }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; background: #0f0f0f; color: #fff;
            max-width: 600px; margin: 0 auto; min-height: 100vh;
        }
        header {
            background: #181818; padding: 20px 16px; border-bottom: 3px solid var(--accent);
            display: flex; align-items: center; justify-content: space-between;
        }
        h1 { margin: 0; font-size: 24px; font-weight: 700; }
        .content { padding: 16px; }
        .history-item {
            background: #1c1c1c; 
            padding: 18px; 
            margin-bottom: 16px; 
            border-radius: 16px; 
            position: relative;
        }
        .delete-btn {
            position: absolute; 
            top: 12px; 
            right: 12px; 
            background: #ff4444; 
            color: white; 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }
        .back-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <h1>📖 Workout History</h1>
        <a href="index.html" class="back-btn">← Home</a>
    </header>

    <div class="content">
        <h2 style="margin:10px 0 15px 0;">Your Past Workouts</h2>
        <div id="history-list"></div>
    </div>

    <script>
        function loadFromStorage(key) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : [];
        }

        function saveToStorage(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            const history = loadFromStorage('workoutHistory');

            if (history.length === 0) {
                container.innerHTML = `<p style="color:#666;text-align:center;padding:60px 20px;">No workouts saved yet.<br><br>Go track your first workout!</p>`;
                return;
            }

            let html = '';
            history.forEach((entry, index) => {
                let totalSets = 0, completedSets = 0;
                entry.log.forEach(ex => {
                    totalSets += ex.sets.length;
                    completedSets += ex.sets.filter(s => s.completed).length;
                });

                const date = new Date(entry.date).toLocaleDateString('en-GB');

                html += `
                <div class="history-item">
                    <strong>${entry.dayName}</strong> – ${date}<br>
                    <small style="color:#00ff9d;">${completedSets} of ${totalSets} sets completed</small>
                    <div class="delete-btn" onclick="deleteWorkout(${index});">×</div>
                </div>`;
            });
            container.innerHTML = html;
        }

        window.deleteWorkout = function(index) {
            if (!confirm('Delete this workout permanently?')) return;
            
            let history = loadFromStorage('workoutHistory');
            history.splice(index, 1);
            saveToStorage('workoutHistory', history);
            renderHistory();
        };

        // Load history when page opens
        window.onload = renderHistory;
    </script>
</body>
</html>
