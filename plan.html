<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plan - Alex's Workout Tracker</title>
    <style>
        :root { --accent: #00ff9d; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin:0; padding:0; background:#0f0f0f; color:#fff; max-width:600px; margin:0 auto; min-height:100vh; }
        header { background:#181818; padding:20px 16px; border-bottom:3px solid var(--accent); display:flex; align-items:center; justify-content:space-between; }
        h1 { margin:0; font-size:24px; font-weight:700; }
        .hamburger { font-size:28px; background:none; border:none; color:#fff; cursor:pointer; padding:8px; }
        .menu { display:none; position:absolute; top:68px; right:16px; background:#181818; border-radius:16px; padding:12px 0; box-shadow:0 10px 20px rgba(0,0,0,0.5); width:280px; z-index:1000; }
        .menu.show { display:block; }
        .menu a { display:block; padding:16px 24px; color:#fff; text-decoration:none; font-size:18px; font-weight:600; }
        .menu a:hover { background:#222; }
        .content { padding:16px; }
        .section { background:#1c1c1c; padding:20px; margin-bottom:20px; border-radius:16px; }
        .split-item { background:#222; padding:16px; margin-bottom:12px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; }
        .day { background:#181818; padding:16px; margin-bottom:16px; border-radius:12px; }
        .body-part-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(110px,1fr)); gap:8px; margin:12px 0; }
        .body-part-grid label { background:#222; padding:10px; border-radius:10px; text-align:center; cursor:pointer; }
        .exercise-row { display:flex; gap:8px; margin-bottom:8px; }
        .exercise-row input { flex:1; background:#252525; border:2px solid #333; color:#fff; border-radius:10px; padding:10px; }
        button.add-btn { background:var(--accent); color:#111; border:none; padding:12px 20px; border-radius:12px; font-weight:700; margin-top:12px; }
    </style>
</head>
<body>

    <header>
        <h1>My Splits</h1>
        <button onclick="toggleMenu()" class="hamburger">☰</button>
    </header>

    <div id="menu" class="menu">
        <a href="index.html">Track Today's Workout</a>
        <a href="history.html">View Workout History</a>
        <a href="progress.html">See Your Progress</a>
        <a href="plan.html">Create / Edit Split</a>
    </div>

    <div class="content">
        <div id="split-list"></div>
        <button onclick="createNewSplit()" class="add-btn" style="width:100%;">Create New Split</button>
    </div>

    <div id="edit-form" style="display:none;">
        <div class="section">
            <label>Split Name</label>
            <input id="split-name" type="text" style="width:100%;padding:14px;background:#222;border:2px solid #333;color:#fff;border-radius:12px;font-size:18px;">
        </div>

        <div class="section">
            <label>Days per week</label>
            <select id="num-days" onchange="renderEditDays()" style="width:100%;padding:14px;background:#222;border:2px solid #333;color:#fff;border-radius:12px;font-size:18px;">
                <option value="1">1 day</option><option value="2">2 days</option><option value="3" selected>3 days</option>
                <option value="4">4 days</option><option value="5">5 days</option><option value="6">6 days</option><option value="7">7 days</option>
            </select>
        </div>

        <div id="edit-days-container"></div>

        <button onclick="saveCurrentSplit()" class="add-btn" style="width:100%;margin-top:20px;">Save Split</button>
        <button onclick="cancelEdit()" style="background:#333;color:#fff;width:100%;padding:14px;border-radius:12px;margin-top:8px;">Cancel</button>
    </div>

    <script>
        let customSplits = [];
        let currentEditingId = null;
        const bodyPartsList = ["Shoulders","Arms","Chest","Back","Legs"];

        function loadSplits() {
            const saved = localStorage.getItem('customSplits');
            if (saved) customSplits = JSON.parse(saved);
            renderSplitList();
        }

        function renderSplitList() {
            const container = document.getElementById('split-list');
            if (customSplits.length === 0) {
                container.innerHTML = `<p style="color:#666;text-align:center;padding:60px 20px;">No splits yet.<br>Tap "Create New Split" below!</p>`;
                return;
            }
            let html = '';
            customSplits.forEach(split => {
                html += `
                <div class="split-item">
                    <div>
                        <strong>${split.name}</strong><br>
                        <small style="color:#888;">${split.days.length} days</small>
                    </div>
                    <div>
                        <button onclick="editSplit('${split.id}')" style="background:#333;color:#fff;border:none;padding:8px 16px;border-radius:8px;margin-right:8px;">Edit</button>
                        <button onclick="deleteSplit('${split.id}')" style="background:#ff4444;color:white;border:none;padding:8px 16px;border-radius:8px;">Delete</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function createNewSplit() {
            currentEditingId = null;
            document.getElementById('edit-form').style.display = 'block';
            document.getElementById('split-list').style.display = 'none';
            document.getElementById('split-name').value = "New Split";
            document.getElementById('num-days').value = "3";
            renderEditDays();
        }

        function editSplit(id) {
            currentEditingId = id;
            const split = customSplits.find(s => s.id === id);
            if (!split) return;
            document.getElementById('edit-form').style.display = 'block';
            document.getElementById('split-list').style.display = 'none';
            document.getElementById('split-name').value = split.name;
            document.getElementById('num-days').value = split.days.length;
            renderEditDays(split);
        }

        function cancelEdit() {
            document.getElementById('edit-form').style.display = 'none';
            document.getElementById('split-list').style.display = 'block';
            currentEditingId = null;
        }

        function renderEditDays(preloadSplit = null) {
            const num = parseInt(document.getElementById('num-days').value);
            const container = document.getElementById('edit-days-container');
            container.innerHTML = '';

            const days = preloadSplit ? preloadSplit.days : Array(num).fill().map(() => ({ bodyParts: [], exercises: [] }));

            for (let i = 0; i < num; i++) {
                const day = days[i] || { bodyParts: [], exercises: [] };
                let html = `<div class="day"><strong>Day ${i+1}</strong><div class="body-part-grid">`;
                bodyPartsList.forEach(part => {
                    const checked = day.bodyParts.includes(part) ? 'checked' : '';
                    html += `<label><input type="checkbox" ${checked} onchange="toggleBodyPartInEdit(${i}, '${part}')"> ${part}</label>`;
                });
                html += `</div><div id="edit-exercises-${i}"></div><button onclick="addExerciseInEdit(${i})" class="add-btn" style="background:#333;color:#fff;">Add Exercise</button></div>`;
                container.innerHTML += html;
                renderEditExercises(i, day.exercises);
            }
        }

        function toggleBodyPartInEdit(dayIndex, part) {
            // handled on save
        }

        function renderEditExercises(dayIndex, exercises) {
            const container = document.getElementById(`edit-exercises-${dayIndex}`);
            let html = '';
            exercises.forEach((ex, idx) => {
                html += `<div class="exercise-row"><input type="text" value="${ex.name}"><input type="number" value="${ex.sets}" style="width:80px"><button onclick="this.closest('.exercise-row').remove()" style="background:#ff4444;color:white;border:none;width:40px;border-radius:10px;">×</button></div>`;
            });
            container.innerHTML = html;
        }

        function addExerciseInEdit(dayIndex) {
            const container = document.getElementById(`edit-exercises-${dayIndex}`);
            const row = document.createElement('div');
            row.className = 'exercise-row';
            row.innerHTML = `<input type="text" placeholder="Exercise name"><input type="number" value="3" style="width:80px"><button onclick="this.closest('.exercise-row').remove()" style="background:#ff4444;color:white;border:none;width:40px;border-radius:10px;">×</button>`;
            container.appendChild(row);
        }

        function saveCurrentSplit() {
            const name = document.getElementById('split-name').value.trim() || "Untitled Split";
            const numDays = parseInt(document.getElementById('num-days').value);
            const days = [];

            const dayDivs = document.querySelectorAll('.day');
            for (let i = 0; i < numDays; i++) {
                const dayDiv = dayDivs[i];
                const checkedBoxes = dayDiv.querySelectorAll('input[type="checkbox"]:checked');
                const bodyParts = Array.from(checkedBoxes).map(cb => cb.nextSibling.textContent.trim());
                
                let dayName = `Day ${i+1}`;
                if (bodyParts.length > 0) dayName += ` – ${bodyParts.join(' + ')}`;

                const exercises = [];
                dayDiv.querySelectorAll('.exercise-row').forEach(row => {
                    const inputs = row.querySelectorAll('input');
                    if (inputs.length >= 2) {
                        const exName = inputs[0].value.trim();
                        const sets = parseInt(inputs[1].value) || 3;
                        if (exName) exercises.push({ name: exName, sets });
                    }
                });

                days.push({ name: dayName, bodyParts, exercises });
            }

            if (currentEditingId) {
                const split = customSplits.find(s => s.id === currentEditingId);
                if (split) {
                    split.name = name;
                    split.days = days;
                }
            } else {
                customSplits.push({ id: 'split-' + Date.now(), name, days });
            }

            localStorage.setItem('customSplits', JSON.stringify(customSplits));
            alert('Split saved');
            cancelEdit();
            loadSplits();
        }

        function deleteSplit(id) {
            if (!confirm('Delete this split permanently?')) return;
            customSplits = customSplits.filter(s => s.id !== id);
            localStorage.setItem('customSplits', JSON.stringify(customSplits));
            loadSplits();
        }

        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('show');
        }

        window.onload = loadSplits;
    </script>
</body>
</html>
