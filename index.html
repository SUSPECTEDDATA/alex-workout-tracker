<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex's Workout Tracker</title>
    <style>
        :root { --accent: #00ff9d; }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; background: #0f0f0f; color: #fff;
            max-width: 600px; margin: 0 auto; min-height: 100vh;
        }
        header {
            background: #181818; padding: 20px 16px; border-bottom: 3px solid var(--accent);
            display: flex; align-items: center; justify-content: flex-start;
        }
        h1 { margin: 0; font-size: 26px; font-weight: 700; }
        .content { padding: 40px 16px; text-align: center; }
        .big-btn {
            background: var(--accent); color: #111; border: none; padding: 24px; font-size: 22px; font-weight: 700;
            border-radius: 16px; width: 100%; margin-bottom: 20px; text-decoration: none; display: block;
        }
        .big-btn:active { transform: scale(0.95); }
        .big-btn.secondary { background:#222; color:#fff; }
    </style>
</head>
<body>

    <header><h1>Alex's Workout Tracker</h1></header>

    <div class="content">
        <a href="track.html" class="big-btn">🚀 Track Today's Workout</a>
        <a href="history.html" class="big-btn secondary">📖 View Workout History</a>
        <a href="progress.html" class="big-btn secondary">📈 See Your Progress</a>
    </div>

</body>
</html>
